<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Забыл пароль — Zhanym</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;font-family:'Nunito',sans-serif;background:#0d0d1a;color:white}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 20%,rgba(255,77,109,.2) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(255,133,161,.15) 0%,transparent 50%),#0d0d1a;pointer-events:none}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px}

.logo-wrap{text-align:center;margin-bottom:28px}
.logo-icon{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,#ff4d6d,#ff85a1);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px;box-shadow:0 12px 30px rgba(255,77,109,.4)}
.logo-title{font-size:26px;font-weight:900;letter-spacing:-1px}
.logo-title span{color:#ff4d6d}
.logo-sub{color:rgba(255,255,255,.4);font-size:13px;margin-top:4px;font-weight:600}

.card{width:100%;max-width:400px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:28px;padding:28px 24px;backdrop-filter:blur(20px)}
.card-title{font-size:20px;font-weight:900;margin-bottom:6px}
.card-sub{color:rgba(255,255,255,.4);font-size:13px;margin-bottom:24px;font-weight:600}

.alert{padding:12px 16px;border-radius:14px;font-size:14px;font-weight:600;margin-bottom:16px;display:none;text-align:center}
.alert-error{background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.3);color:#ff85a1}
.alert-success{background:rgba(6,214,160,.12);border:1px solid rgba(6,214,160,.3);color:#06d6a0}

.group{margin-bottom:14px}
.group label{display:block;font-size:11px;font-weight:800;color:rgba(255,255,255,.35);margin-bottom:7px;letter-spacing:1px;text-transform:uppercase}
.input-wrap{position:relative}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.group input{width:100%;padding:14px 14px 14px 44px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:14px;color:white;font-size:15px;font-family:'Nunito',sans-serif;font-weight:600;outline:none;transition:.2s;-webkit-appearance:none}
.group input::placeholder{color:rgba(255,255,255,.2)}
.group input:focus{border-color:#ff4d6d;background:rgba(255,77,109,.08)}
.code-input{text-align:center;font-size:28px;letter-spacing:12px;padding:14px!important}

.btn{width:100%;padding:16px;background:linear-gradient(135deg,#ff4d6d,#ff85a1);border:none;border-radius:50px;color:white;font-size:16px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;margin-top:8px;box-shadow:0 10px 25px rgba(255,77,109,.4);transition:.2s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.6;pointer-events:none}

.back-link{text-align:center;margin-top:20px;color:rgba(255,255,255,.35);font-size:14px;font-weight:600}
.back-link a{color:#ff4d6d;text-decoration:none;font-weight:800}

.step{display:none}
.step.active{display:block}

.steps-bar{display:flex;justify-content:center;gap:8px;margin-bottom:24px}
.step-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);transition:.3s}
.step-dot.active{background:#ff4d6d;width:24px;border-radius:4px}
</style>
</head>
<body>
<div class="bg"></div>
<div class="page">
  <div class="logo-wrap">
    <div class="logo-icon">🔑</div>
    <div class="logo-title">Zha<span>nym</span></div>
    <div class="logo-sub">Восстановление пароля</div>
  </div>

  <div class="card">
    <div class="steps-bar">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
      <div class="step-dot" id="dot3"></div>
    </div>

    <div class="alert alert-error" id="error"></div>
    <div class="alert alert-success" id="success"></div>

    <!-- ШАГ 1: Email -->
    <div class="step active" id="step1">
      <div class="card-title">📧 Введи email</div>
      <div class="card-sub">Отправим 6-значный код на твою почту</div>
      <div class="group">
        <label>Email</label>
        <div class="input-wrap">
          <span class="input-icon">📧</span>
          <input type="email" id="email" placeholder="твой@email.com" autocomplete="email">
        </div>
      </div>
      <button class="btn" id="btn1" onclick="sendCode()">📨 Отправить код</button>
    </div>

    <!-- ШАГ 2: Код -->
    <div class="step" id="step2">
      <div class="card-title">🔐 Введи код</div>
      <div class="card-sub" id="codeSubText">Код отправлен на твою почту</div>
      <div class="group">
        <label>6-значный код</label>
        <div class="input-wrap">
          <input type="text" id="code" class="code-input" placeholder="——————" maxlength="6" inputmode="numeric">
        </div>
      </div>
      <button class="btn" onclick="verifyCode()">✅ Подтвердить</button>
    </div>

    <!-- ШАГ 3: Новый пароль -->
    <div class="step" id="step3">
      <div class="card-title">🔒 Новый пароль</div>
      <div class="card-sub">Придумай надёжный пароль</div>
      <div class="group">
        <label>Новый пароль</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="newpass" placeholder="Минимум 8 символов">
        </div>
      </div>
      <div class="group">
        <label>Повтори пароль</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="newpass2" placeholder="Повтори пароль">
        </div>
      </div>
      <button class="btn" onclick="savePassword()">💾 Сохранить пароль</button>
    </div>
  </div>

  <div class="back-link"><a href="/login">← Вернуться к входу</a></div>
</div>

<script>
let userEmail = '';
let resetCode = '';

function goStep(n){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('step'+n).classList.add('active');
  document.querySelectorAll('.step-dot').forEach((d,i)=>{
    d.classList.toggle('active', i<n);
  });
  hideAlerts();
}

async function sendCode(){
  const email = document.getElementById('email').value.trim();
  if(!email){ showError('Введи email'); return; }
  userEmail = email;

  const btn = document.getElementById('btn1');
  btn.textContent = '⏳ Отправляем...';
  btn.disabled = true;

  try{
    const res = await fetch('/users/forgot-password?email='+encodeURIComponent(email), {method:'POST'});
    const data = await res.json();

    if(data.found){
      document.getElementById('codeSubText').textContent = `Код отправлен на ${email}`;
      goStep(2);
      showSuccess('✅ Код отправлен! Проверь почту.');
    } else {
      showError(data.message || '❌ Email не найден');
    }
  }catch(e){
    showError('❌ Ошибка сервера');
  }

  btn.textContent = '📨 Отправить код';
  btn.disabled = false;
}

async function verifyCode(){
  const code = document.getElementById('code').value.trim();
  if(code.length !== 6){ showError('Введи 6-значный код'); return; }
  resetCode = code;

  try{
    const res = await fetch('/users/verify-reset-code?email='+encodeURIComponent(userEmail)+'&code='+code, {method:'POST'});
    if(res.ok){
      goStep(3);
      showSuccess('✅ Код верный!');
    } else {
      showError('❌ Неверный код. Попробуй снова.');
    }
  }catch(e){
    showError('❌ Ошибка сервера');
  }
}

async function savePassword(){
  const p1 = document.getElementById('newpass').value;
  const p2 = document.getElementById('newpass2').value;
  if(!p1||p1.length<8){ showError('Пароль минимум 8 символов'); return; }
  if(p1!==p2){ showError('Пароли не совпадают'); return; }

  try{
    const res = await fetch('/users/reset-password-by-code?email='+encodeURIComponent(userEmail)+'&code='+resetCode+'&new_password='+encodeURIComponent(p1), {method:'POST'});
    if(res.ok){
      showSuccess('✅ Пароль изменён! Перенаправляем...');
      setTimeout(()=>window.location.href='/login', 2000);
    } else {
      showError('❌ Ошибка. Попробуй снова.');
    }
  }catch(e){
    showError('❌ Ошибка сервера');
  }
}

function showError(msg){ const el=document.getElementById('error'); el.textContent=msg; el.style.display='block'; document.getElementById('success').style.display='none'; }
function showSuccess(msg){ const el=document.getElementById('success'); el.textContent=msg; el.style.display='block'; document.getElementById('error').style.display='none'; }
function hideAlerts(){ document.getElementById('error').style.display='none'; document.getElementById('success').style.display='none'; }
</script>
</body>
</html>
