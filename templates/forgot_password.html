<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Забыл пароль — Zhanym</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:url('/static/hero.jpg') center/cover;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#fff;border-radius:30px;padding:40px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
h1{color:#ff6b6b;margin-bottom:5px;font-size:26px}
.sub{color:#aaa;margin-bottom:25px;font-size:14px}
input{width:100%;padding:12px 15px;border:2px solid #eee;border-radius:12px;font-size:15px;outline:none;margin-bottom:15px}
input:focus{border-color:#ff6b6b}
.btn{width:100%;padding:15px;background:linear-gradient(135deg,#ff4458,#fd79a8);color:white;border:none;border-radius:50px;font-size:17px;font-weight:bold;cursor:pointer}
.back{display:block;margin-top:15px;color:#aaa;font-size:14px;text-decoration:none}
.back:hover{color:#ff6b6b}
.success{background:#e0ffe0;color:#00a854;padding:12px;border-radius:10px;margin-bottom:15px;display:none}
.error{background:#ffe0e0;color:#ff4444;padding:12px;border-radius:10px;margin-bottom:15px;display:none}
</style>
</head>
<body>
<div class="box">
 <div style="font-size:40px;margin-bottom:10px">🔑</div>
  <h1>Забыл пароль?</h1>
  <p class="sub" id="subText">Введи свой email — отправим код в Telegram</p>
  <div class="success" id="success"></div>
  <div class="error" id="error"></div>

  <!-- ШАГ 1: Email -->
  <div id="step1">
    <input type="email" id="email" placeholder="твой@email.com">
    <button class="btn" onclick="sendCode()">📱 Отправить код</button>
  </div>

  <!-- ШАГ 2: Код -->
  <div id="step2" style="display:none">
    <p style="color:#aaa;font-size:13px;margin-bottom:15px">Введи 6-значный код из Telegram</p>
    <input type="text" id="code" placeholder="123456" maxlength="6" style="text-align:center;font-size:24px;letter-spacing:8px">
    <button class="btn" onclick="verifyCode()">✅ Подтвердить</button>
  </div>

  <!-- ШАГ 3: Новый пароль -->
  <div id="step3" style="display:none">
    <input type="password" id="newpass" placeholder="Новый пароль">
    <input type="password" id="newpass2" placeholder="Повтори пароль">
    <button class="btn" onclick="savePassword()">💾 Сохранить пароль</button>
  </div>

  <a href="/login" class="back">← Вернуться к входу</a>
</div>
<script>
let userEmail = '';
let resetCode = '';

async function sendCode(){
  const email = document.getElementById('email').value;
  if(!email){ showError('Введи email'); return; }
  userEmail = email;

  const btn = document.querySelector('#step1 .btn');
  btn.textContent = '⏳ Отправляем...';
  btn.disabled = true;

  const res = await fetch('/users/forgot-password?email='+encodeURIComponent(email), {method:'POST'});
  const data = await res.json();

  btn.textContent = '📱 Отправить код';
  btn.disabled = false;

  if(data.found){
    document.getElementById('step1').style.display='none';
    document.getElementById('step2').style.display='block';
    showSuccess('✅ Код отправлен в Telegram!');
  } else if(data.no_telegram){
    showError('❌ Telegram не подключён. Зайди в профиль и подключи Telegram.');
  } else {
    showError('❌ Email не найден. Проверь правильность написания.');
  }
}

async function verifyCode(){
  const code = document.getElementById('code').value;
  if(code.length !== 6){ showError('Введи 6-значный код'); return; }
  resetCode = code;

  const res = await fetch('/users/verify-reset-code?email='+encodeURIComponent(userEmail)+'&code='+code, {method:'POST'});
  const data = await res.json();

  if(res.ok){
    document.getElementById('step2').style.display='none';
    document.getElementById('step3').style.display='block';
    showSuccess('✅ Код верный! Введи новый пароль.');
  } else {
    showError('❌ Неверный код. Попробуй снова.');
  }
}

async function savePassword(){
  const p1 = document.getElementById('newpass').value;
  const p2 = document.getElementById('newpass2').value;
  if(!p1||!p2){ showError('Заполни все поля'); return; }
  if(p1!==p2){ showError('Пароли не совпадают'); return; }

  const res = await fetch('/users/reset-password-by-code?email='+encodeURIComponent(userEmail)+'&code='+resetCode+'&new_password='+encodeURIComponent(p1), {method:'POST'});
  const data = await res.json();

  if(res.ok){
    showSuccess('✅ Пароль изменён! Перенаправляем...');
    setTimeout(()=>window.location.href='/login', 2000);
  } else {
    showError('❌ Ошибка. Попробуй снова.');
  }
}

function showError(msg){
  const el=document.getElementById('error');
  el.textContent=msg; el.style.display='block';
  document.getElementById('success').style.display='none';
}
function showSuccess(msg){
  const el=document.getElementById('success');
  el.textContent=msg; el.style.display='block';
  document.getElementById('error').style.display='none';
}
</script>
</body>
</html>
