<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Новый пароль — Zhanym</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:url('/static/hero.jpg') center/cover;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#fff;border-radius:30px;padding:40px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
h1{color:#ff6b6b;margin-bottom:5px;font-size:26px}
.sub{color:#aaa;margin-bottom:25px;font-size:14px}
input{width:100%;padding:12px 15px;border:2px solid #eee;border-radius:12px;font-size:15px;outline:none;margin-bottom:15px}
input:focus{border-color:#ff6b6b}
.btn{width:100%;padding:15px;background:linear-gradient(135deg,#ff4458,#fd79a8);color:white;border:none;border-radius:50px;font-size:17px;font-weight:bold;cursor:pointer}
.success{background:#e0ffe0;color:#00a854;padding:12px;border-radius:10px;margin-bottom:15px;display:none}
.error{background:#ffe0e0;color:#ff4444;padding:12px;border-radius:10px;margin-bottom:15px;display:none}
</style>
</head>
<body>
<div class="box">
  <div style="font-size:40px;margin-bottom:10px">🔐</div>
  <h1>Новый пароль</h1>
  <p class="sub">Введи новый пароль для аккаунта</p>
  <div class="success" id="success">✅ Пароль изменён! <a href="/login">Войти</a></div>
  <div class="error" id="error"></div>
  <input type="password" id="password" placeholder="Новый пароль">
  <input type="password" id="password2" placeholder="Повтори пароль">
  <button class="btn" onclick="resetPass()">💾 Сохранить пароль</button>
</div>
<script>
const token = new URLSearchParams(window.location.search).get('token');
async function resetPass(){
  const p1 = document.getElementById('password').value;
  const p2 = document.getElementById('password2').value;
  if(!p1||!p2){ showError('Заполни все поля'); return; }
  if(p1!==p2){ showError('Пароли не совпадают'); return; }
  const res = await fetch('/users/reset-password?token='+token+'&new_password='+encodeURIComponent(p1), {method:'POST'});
  const data = await res.json();
  if(res.ok){ document.getElementById('success').style.display='block'; }
  else { showError(data.detail||'Ошибка'); }
}
function showError(msg){ const el=document.getElementById('error'); el.textContent=msg; el.style.display='block'; }
</script>
</body>
</html>
