<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чат — Zhanym</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a0a1a;height:100vh;display:flex;flex-direction:column;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.header{background:rgba(255,255,255,.03);padding:12px 25px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.08);backdrop-filter:blur(20px);position:relative;z-index:10}
.logo{font-size:22px;font-weight:bold;color:white;text-decoration:none}
.nav a{margin-left:12px;text-decoration:none;color:rgba(255,255,255,.5);font-size:13px;padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.1);transition:.2s}
.nav a:hover{background:rgba(255,255,255,.1);color:white}
.chat-container{display:flex;flex:1;overflow:hidden;max-width:1100px;margin:20px auto;width:100%;gap:15px;padding:0 20px;position:relative;z-index:5}
.matches-list{width:280px;background:rgba(255,255,255,.04);border-radius:24px;overflow-y:auto;border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(20px)}
.matches-list::-webkit-scrollbar{width:4px}
.matches-list::-webkit-scrollbar-thumb{background:rgba(255,100,150,.4);border-radius:2px}
.matches-title{padding:20px;font-weight:bold;color:white;font-size:16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:8px}
.match-item{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.05);transition:.2s;position:relative}
.match-item:hover{background:rgba(255,100,150,.08)}
.match-item.active{background:rgba(255,100,150,.12);border-left:3px solid #ff6b9d}
.match-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#ff6b6b,#fd79a8);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 0 15px rgba(255,107,107,.3);border:2px solid rgba(255,107,107,.3);position:relative}
.match-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.unread-badge{position:absolute;top:-4px;right:-4px;background:#ff4458;color:white;font-size:10px;font-weight:bold;padding:2px 6px;border-radius:50px;min-width:18px;text-align:center;box-shadow:0 0 8px rgba(255,68,88,.6)}
.match-name{font-weight:bold;font-size:14px;color:white}
.match-city{color:rgba(255,255,255,.4);font-size:12px;margin-top:2px}
.online-dot{width:10px;height:10px;background:#00e676;border-radius:50%;position:absolute;right:18px;top:50%;transform:translateY(-50%);box-shadow:0 0 6px #00e676}
.no-matches{padding:30px;text-align:center;color:rgba(255,255,255,.3);line-height:1.8}
.chat-area{flex:1;background:rgba(255,255,255,.03);border-radius:24px;display:flex;flex-direction:column;border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(20px);overflow:hidden}
.chat-header{padding:18px 22px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.03)}
.chat-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#ff6b6b,#fd79a8);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px rgba(255,107,107,.4);border:2px solid rgba(255,107,107,.3)}
.chat-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.chat-name{font-weight:bold;color:white;font-size:16px}
.chat-status{color:#00e676;font-size:12px;margin-top:2px;display:flex;align-items:center;gap:4px}
.chat-status::before{content:'';width:7px;height:7px;background:#00e676;border-radius:50%;display:inline-block;box-shadow:0 0 6px #00e676}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:rgba(255,100,150,.3);border-radius:2px}
.msg{max-width:65%;padding:13px 18px;border-radius:20px;font-size:15px;line-height:1.5;position:relative;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.sent{background:linear-gradient(135deg,rgba(255,107,107,.8),rgba(253,121,168,.8));color:white;align-self:flex-end;border-bottom-right-radius:5px;box-shadow:0 4px 20px rgba(255,107,107,.3);backdrop-filter:blur(10px);border:1px solid rgba(255,107,107,.3)}
.msg.received{background:rgba(255,255,255,.07);color:white;align-self:flex-start;border-bottom-left-radius:5px;box-shadow:0 4px 20px rgba(0,0,0,.2);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1)}
.msg-time{font-size:10px;opacity:.6;margin-top:5px;text-align:right}
.chat-input{padding:15px 20px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:10px;background:rgba(255,255,255,.02)}
.chat-input input{flex:1;padding:13px 20px;border:1px solid rgba(255,255,255,.1);border-radius:30px;font-size:15px;outline:none;background:rgba(255,255,255,.07);color:white;transition:.3s}
.chat-input input::placeholder{color:rgba(255,255,255,.3)}
.chat-input input:focus{border-color:rgba(255,107,107,.5);background:rgba(255,255,255,.1);box-shadow:0 0 15px rgba(255,107,107,.15)}
.chat-input button{width:50px;height:50px;background:linear-gradient(135deg,#ff6b6b,#fd79a8);color:white;border:none;border-radius:50%;cursor:pointer;font-size:20px;transition:.2s;box-shadow:0 4px 15px rgba(255,107,107,.4);display:flex;align-items:center;justify-content:center}
.chat-input button:hover{transform:scale(1.1)}
.empty-chat{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;color:rgba(255,255,255,.3);gap:15px;text-align:center;padding:30px}
.empty-chat .icon{font-size:70px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.empty-chat h3{font-size:22px;color:rgba(255,255,255,.6)}
.empty-chat p{font-size:14px;line-height:1.6}

/* УВЕДОМЛЕНИЕ ВСПЛЫВАЮЩЕЕ */
.notify{position:fixed;top:80px;right:20px;background:rgba(20,10,40,.95);border:1px solid rgba(255,107,107,.4);border-radius:16px;padding:14px 18px;display:flex;align-items:center;gap:12px;z-index:999;backdrop-filter:blur(20px);box-shadow:0 8px 30px rgba(255,107,107,.3);transform:translateX(200%);transition:.4s;max-width:280px}
.notify.show{transform:translateX(0)}
.notify-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#ff6b6b,#fd79a8);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.notify-text{font-size:13px;color:white}
.notify-name{font-weight:bold;margin-bottom:2px}
.notify-msg{color:rgba(255,255,255,.6);font-size:12px}
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="notify" id="notify">
  <div class="notify-avatar" id="notifyAvatar">👤</div>
  <div class="notify-text">
    <div class="notify-name" id="notifyName"></div>
    <div class="notify-msg" id="notifyMsg"></div>
  </div>
</div>

<script>
const c = document.getElementById('stars'), ctx = c.getContext('2d');
c.width = window.innerWidth; c.height = window.innerHeight;
const stars = Array.from({length:300}, () => ({x:Math.random()*c.width-c.width/2,y:Math.random()*c.height-c.height/2,z:Math.random()*c.width,pz:0}));
const nebula = Array.from({length:5}, () => ({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*200+100,hue:Math.random()*60+270,o:Math.random()*.06+.02}));
function drawStars(){
  ctx.fillStyle='rgba(10,10,26,0.2)';ctx.fillRect(0,0,c.width,c.height);
  nebula.forEach(n=>{const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);g.addColorStop(0,`hsla(${n.hue},80%,60%,${n.o})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();});
  stars.forEach(s=>{s.pz=s.z;s.z-=2;if(s.z<=0){s.x=Math.random()*c.width-c.width/2;s.y=Math.random()*c.height-c.height/2;s.z=c.width;s.pz=s.z;}
  const sx=(s.x/s.z)*c.width+c.width/2,sy=(s.y/s.z)*c.height+c.height/2,px=(s.x/s.pz)*c.width+c.width/2,py=(s.y/s.pz)*c.height+c.height/2;
  const size=Math.max(.5,(1-s.z/c.width)*3),bright=1-s.z/c.width;
  ctx.strokeStyle=`rgba(255,255,255,${bright})`;ctx.lineWidth=size;ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(sx,sy);ctx.stroke();});
  requestAnimationFrame(drawStars);
}
drawStars();
window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight;});
</script>

<div class="header">
  <a href="/" class="logo">🌹 Zhanym</a>
  <div class="nav">
    <a href="/dashboard">🔥 Лента</a>
    <a href="/profile">👤 Профиль</a>
    <a href="#" onclick="logout()">Выйти</a>
  </div>
</div>

<div class="chat-container">
  <div class="matches-list">
    <div class="matches-title">💞 Пары</div>
    <div id="matchesList"></div>
  </div>
  <div class="chat-area">
    <div class="chat-header" id="chatHeader" style="display:none">
      <div class="chat-avatar" id="chatAvatar">👤</div>
      <div>
        <div class="chat-name" id="chatName"></div>
        <div class="chat-status">онлайн</div>
      </div>
    </div>
    <div class="messages" id="messages">
      <div class="empty-chat">
        <div class="icon">💫</div>
        <h3>Выбери пару</h3>
        <p>Начни общение с<br>понравившимся человеком</p>
      </div>
    </div>
    <div class="chat-input" id="chatInput" style="display:none">
      <input type="text" id="messageInput" placeholder="Напиши сообщение...">
      <button id="sendBtn">➤</button>
    </div>
  </div>
</div>

<script>
const token = localStorage.getItem('token');
if(!token) window.location.href = '/login';
let currentMatchId = null;
let ws = null;
let myId = null;
let matchesData = [];

document.getElementById('messageInput').addEventListener('keypress', e => { if(e.key==='Enter') sendMessage(); });
document.getElementById('sendBtn').addEventListener('click', sendMessage);

async function loadMe() {
  const res = await fetch('/users/me', {headers:{'Authorization':'Bearer '+token}});
  if(res.status===401){ window.location.href='/login'; return; }
  const me = await res.json();
  myId = me.id;
  connectGlobalWS();
  loadMatches();
}

// ГЛОБАЛЬНЫЙ WEBSOCKET — слушает все входящие сообщения
function connectGlobalWS() {
  window._globalWs = new WebSocket('ws://127.0.0.1:8000/chat/ws/'+myId);
  const globalWs = window._globalWs;

  globalWs.onmessage = function(e) {
    const data = JSON.parse(e.data);
    // Если чат с этим человеком не открыт — показать уведомление
    if(data.sender_id !== currentMatchId) {
      const sender = matchesData.find(m => m.id === data.sender_id);
      if(sender) showNotify(sender, data.message);
      // Добавить красный бейдж
      addUnreadBadge(data.sender_id);
    } else {
      addMessage(data.message, 'received', data.time);
    }
  };
  globalWs.onclose = () => setTimeout(connectGlobalWS, 3000);
}

function showNotify(sender, message) {
  const avatar = sender.photo && sender.photo !== 'default.jpg'
    ? `<img src="/static/uploads/${sender.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
    : (sender.gender==='female' ? '👩' : '👨');
  document.getElementById('notifyAvatar').innerHTML = avatar;
  document.getElementById('notifyName').textContent = sender.name;
  document.getElementById('notifyMsg').textContent = message.length > 30 ? message.substring(0,30)+'...' : message;
  const n = document.getElementById('notify');
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 4000);
}

function addUnreadBadge(senderId) {
  const item = document.getElementById('match-'+senderId);
  if(!item) return;
  const avatar = item.querySelector('.match-avatar');
  let badge = avatar.querySelector('.unread-badge');
  if(!badge){
    badge = document.createElement('span');
    badge.className = 'unread-badge';
    badge.textContent = '1';
    avatar.appendChild(badge);
  } else {
    badge.textContent = parseInt(badge.textContent) + 1;
  }
}

async function loadMatches() {
  try {
    const res = await fetch('/search/matches', {headers:{'Authorization':'Bearer '+token}});
    const matches = await res.json();
    matchesData = matches;

    // Загружаем непрочитанные
    const unreadRes = await fetch('/chat/unread_by_sender', {headers:{'Authorization':'Bearer '+token}});
    const unreadData = await unreadRes.json();

    renderMatches(matches, unreadData);
  } catch(e){ console.log(e); }
}

function renderMatches(matches, unreadData={}) {
  const list = document.getElementById('matchesList');
  if(!matches || !matches.length){
    list.innerHTML = '<div class="no-matches">🌌 Пока нет пар.<br>Лайкай больше!</div>';
    return;
  }
  list.innerHTML = '';
  matches.forEach(function(m) {
    const div = document.createElement('div');
    div.className = 'match-item';
    div.id = 'match-' + m.id;
    const avatarContent = m.photo && m.photo !== 'default.jpg'
      ? `<img src="/static/uploads/${m.photo}">`
      : (m.gender==='female' ? '👩' : '👨');
    const count = unreadData[m.id] || 0;
    const badge = count > 0 ? `<span class="unread-badge">${count}</span>` : '';
    div.innerHTML = `
      <div class="match-avatar">${avatarContent}${badge}</div>
      <div>
        <div class="match-name">${m.name}, ${m.age}</div>
        <div class="match-city">📍 ${m.city||''}</div>
      </div>
      <div class="online-dot"></div>`;
    div.addEventListener('click', function(){ openChat(m.id, m.name, m.gender, m.photo); });
    list.appendChild(div);
  });
}

async function openChat(userId, name, gender, photo) {
  currentMatchId = userId;
  document.querySelectorAll('.match-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('match-'+userId);
  if(el){
    el.classList.add('active');
    // Убираем бейдж
    const badge = el.querySelector('.unread-badge');
    if(badge) badge.remove();
  }

  document.getElementById('chatHeader').style.display = 'flex';
  document.getElementById('chatInput').style.display = 'flex';
  document.getElementById('chatName').textContent = name;

  const avatarEl = document.getElementById('chatAvatar');
  if(photo && photo !== 'default.jpg'){
    avatarEl.innerHTML = `<img src="/static/uploads/${photo}">`;
  } else {
    avatarEl.textContent = gender === 'female' ? '👩' : '👨';
  }

  loadHistory(userId);
}

async function loadHistory(userId) {
  try {
    const res = await fetch('/chat/history/'+userId, {headers:{'Authorization':'Bearer '+token}});
    const msgs = await res.json();
    const container = document.getElementById('messages');
    container.innerHTML = '';
    msgs.forEach(m => addMessage(m.content, m.sender_id === myId ? 'sent' : 'received', m.created_at));
  } catch(e){
    document.getElementById('messages').innerHTML = '';
  }
}

function addMessage(text, type, time) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  const t = time ? new Date(time).toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'}) : '';
  div.innerHTML = text + '<div class="msg-time">'+t+'</div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if(!text || !currentMatchId) return;
  // Используем глобальный WS
  const globalWs = window._globalWs;
  if(globalWs && globalWs.readyState === 1) {
    globalWs.send(JSON.stringify({receiver_id: currentMatchId, message: text}));
  }
  addMessage(text, 'sent', new Date().toISOString());
  input.value = '';
}

function logout(){ localStorage.removeItem('token'); window.location.href='/'; }
loadMe();
</script>
</body>
</html>
