<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чат — Zhanym</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff4d6d;--pink2:#ff85a1;--dark:#0d0d1a;--card:#16162a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--dark);color:white;overflow:hidden}

/* ===== MATCHES LIST VIEW ===== */
.view{position:fixed;inset:0;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.4,0,.2,1)}
.view.hidden{transform:translateX(-100%)}

/* HEADER */
.page-header{
  padding:54px 20px 14px;
  background:rgba(13,13,26,.95);
  border-bottom:1px solid rgba(255,255,255,.07);
  backdrop-filter:blur(20px);
  flex-shrink:0;
}
.page-title{font-size:24px;font-weight:900;letter-spacing:-.5px}
.page-title span{color:var(--pink)}
.page-sub{color:rgba(255,255,255,.35);font-size:13px;font-weight:600;margin-top:2px}

/* MATCHES */
.matches-scroll{flex:1;overflow-y:auto;padding:8px 0 90px}
.matches-scroll::-webkit-scrollbar{display:none}

.match-item{
  display:flex;align-items:center;gap:14px;
  padding:14px 20px;
  border-bottom:1px solid rgba(255,255,255,.04);
  cursor:pointer;transition:.15s;
  position:relative;
}
.match-item:active{background:rgba(255,77,109,.06)}
.match-avatar{
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--pink),var(--pink2));
  display:flex;align-items:center;justify-content:center;
  font-size:26px;flex-shrink:0;position:relative;
  border:2px solid rgba(255,77,109,.3);
}
.match-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.online-ring{
  position:absolute;bottom:1px;right:1px;
  width:14px;height:14px;border-radius:50%;
  background:#06d6a0;border:2px solid var(--dark);
}
.unread-badge{
  position:absolute;top:-3px;right:-3px;
  background:var(--pink);color:white;
  font-size:10px;font-weight:900;
  min-width:18px;height:18px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  padding:0 4px;border:2px solid var(--dark);
}
.match-info{flex:1;min-width:0}
.match-name{font-size:15px;font-weight:800;color:white}
.match-preview{
  color:rgba(255,255,255,.4);font-size:13px;font-weight:600;
  margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.match-time{font-size:11px;color:rgba(255,255,255,.25);font-weight:600;flex-shrink:0}
.match-arrow{color:rgba(255,255,255,.15);font-size:16px;margin-left:6px}

.no-matches{
  text-align:center;padding:60px 30px;
  display:flex;flex-direction:column;align-items:center;
}
.no-matches-emoji{font-size:64px;margin-bottom:16px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.no-matches h3{font-size:20px;font-weight:900;margin-bottom:8px}
.no-matches p{color:rgba(255,255,255,.35);font-size:14px;line-height:1.6}
.no-matches-btn{
  margin-top:24px;padding:14px 28px;
  background:linear-gradient(135deg,var(--pink),var(--pink2));
  border:none;border-radius:50px;color:white;
  font-size:15px;font-weight:800;cursor:pointer;
  font-family:'Nunito',sans-serif;
}

/* ===== CHAT VIEW ===== */
.chat-view{position:fixed;inset:0;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:50}
.chat-view.active{transform:translateX(0)}

.chat-header{
  padding:54px 16px 12px;
  background:rgba(13,13,26,.97);
  border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;gap:12px;
  backdrop-filter:blur(20px);flex-shrink:0;
}
.back-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;flex-shrink:0;
}
.back-btn:active{transform:scale(.9)}
.chat-avatar-sm{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,var(--pink),var(--pink2));
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
  border:2px solid rgba(255,77,109,.3);
}
.chat-avatar-sm img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.chat-info{flex:1;min-width:0}
.chat-name{font-size:16px;font-weight:900}
.chat-status{
  display:flex;align-items:center;gap:5px;
  font-size:12px;font-weight:600;color:#06d6a0;margin-top:2px;
}
.chat-status::before{content:'';width:6px;height:6px;border-radius:50%;background:#06d6a0;box-shadow:0 0 6px #06d6a0}

/* MESSAGES */
.messages{
  flex:1;overflow-y:auto;
  padding:16px 16px 12px;
  padding-bottom:80px;
  display:flex;flex-direction:column;gap:8px;
  background:var(--dark);
}
.messages::-webkit-scrollbar{display:none}

.msg{
  max-width:75%;padding:12px 16px;
  border-radius:20px;font-size:15px;
  line-height:1.5;animation:msgIn .25s ease;
}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.sent{
  background:linear-gradient(135deg,rgba(255,77,109,.85),rgba(255,133,161,.85));
  color:white;align-self:flex-end;
  border-bottom-right-radius:5px;
  box-shadow:0 4px 15px rgba(255,77,109,.25);
}
.msg.received{
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.08);
  color:white;align-self:flex-start;
  border-bottom-left-radius:5px;
}
.msg-time{font-size:10px;opacity:.55;margin-top:4px;text-align:right}
.msg.received .msg-time{text-align:left}

.date-divider{
  text-align:center;margin:8px 0;
  font-size:11px;font-weight:700;
  color:rgba(255,255,255,.25);
  display:flex;align-items:center;gap:10px;
}
.date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}

.empty-chat{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:30px;
}
.empty-chat-emoji{font-size:56px;margin-bottom:14px;animation:float 3s ease-in-out infinite}
.empty-chat h3{font-size:18px;font-weight:900;margin-bottom:6px}
.empty-chat p{color:rgba(255,255,255,.35);font-size:13px;line-height:1.6}

/* INPUT */
.chat-input-wrap{
  padding:10px 16px 20px;
  position:fixed;
  bottom:80px;
  left:0;right:0;
  background:rgba(13,13,26,.97);
  border-top:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
}
.chat-input{
  flex:1;padding:13px 18px;
  background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.1);
  border-radius:50px;color:white;
  font-size:15px;font-family:'Nunito',sans-serif;font-weight:600;
  outline:none;transition:.2s;-webkit-appearance:none;
}
.chat-input::placeholder{color:rgba(255,255,255,.25)}
.chat-input:focus{border-color:var(--pink);background:rgba(255,77,109,.08)}
.send-btn{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--pink),var(--pink2));
  border:none;color:white;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(255,77,109,.4);
  transition:.2s;flex-shrink:0;
}
.send-btn:active{transform:scale(.9)}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;height:80px;
  background:rgba(13,13,26,.95);
  border-top:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:space-around;
  padding:0 10px;backdrop-filter:blur(20px);z-index:100;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  text-decoration:none;color:rgba(255,255,255,.35);
  font-size:10px;font-weight:700;padding:6px 12px;
  border-radius:16px;transition:.2s;
  text-transform:uppercase;letter-spacing:.5px;position:relative;
}
.nav-item.active{color:var(--pink)}
.nav-item.active .nav-icon{background:rgba(255,77,109,.15);border-color:rgba(255,77,109,.3)}
.nav-icon{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid transparent;transition:.2s}
.nav-badge{position:absolute;top:4px;right:8px;background:var(--pink);color:white;font-size:9px;font-weight:900;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--dark)}

/* NOTIFY */
.notify{
  position:fixed;top:60px;left:16px;right:16px;
  background:rgba(22,22,42,.97);
  border:1px solid rgba(255,77,109,.3);
  border-radius:20px;padding:14px 16px;
  display:flex;align-items:center;gap:12px;
  z-index:999;backdrop-filter:blur(20px);
  box-shadow:0 10px 30px rgba(0,0,0,.5);
  transform:translateY(-120px);transition:.4s cubic-bezier(.34,1.56,.64,1);
}
.notify.show{transform:translateY(0)}
.notify-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--pink2));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.notify-body{flex:1;min-width:0}
.notify-name{font-size:14px;font-weight:800}
.notify-msg{color:rgba(255,255,255,.5);font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
</style>
</head>
<body>

<!-- NOTIFY -->
<div class="notify" id="notify">
  <div class="notify-avatar" id="notifyAvatar">👤</div>
  <div class="notify-body">
    <div class="notify-name" id="notifyName"></div>
    <div class="notify-msg" id="notifyMsg"></div>
  </div>
</div>

<!-- MATCHES LIST VIEW -->
<div class="view" id="matchesView">
  <div class="page-header">
    <div class="page-title">💬 <span>Чат</span></div>
    <div class="page-sub">Твои пары</div>
  </div>
  <div class="matches-scroll" id="matchesList"></div>
</div>

<!-- CHAT VIEW -->
<div class="chat-view" id="chatView">
  <div class="chat-header">
    <div class="back-btn" onclick="backToList()">←</div>
    <div class="chat-avatar-sm" id="chatAvatar">👤</div>
    <div class="chat-info">
      <div class="chat-name" id="chatName">...</div>
      <div class="chat-status">онлайн</div>
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="empty-chat">
      <div class="empty-chat-emoji">💌</div>
      <h3>Напиши первым!</h3>
      <p>Начни общение —<br>возможно это судьба 💫</p>
    </div>
  </div>
  <div class="chat-input-wrap">
    <input class="chat-input" id="messageInput" placeholder="Сообщение..." type="text">
    <button class="send-btn" id="sendBtn">➤</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="/dashboard" class="nav-item"><div class="nav-icon">🔥</div>Лента</a>
  <a href="/likes" class="nav-item"><div class="nav-icon">💛</div>Лайки</a>
  <a href="/chat" class="nav-item active">
    <div class="nav-icon">💬</div>Чат
    <div class="nav-badge" id="navBadge" style="display:none">0</div>
  </a>
  <a href="/profile" class="nav-item"><div class="nav-icon">👤</div>Профиль</a>
</nav>

<script>
const token = localStorage.getItem('token');
if(!token) window.location.href='/login';

let currentMatchId=null, myId=null, matchesData=[];

document.getElementById('messageInput').addEventListener('keypress',e=>{if(e.key==='Enter')sendMessage();});
document.getElementById('sendBtn').addEventListener('click',sendMessage);

async function loadMe(){
  const res=await fetch('/users/me',{headers:{'Authorization':'Bearer '+token}});
  if(res.status===401){window.location.href='/login';return;}
  const me=await res.json();
  myId=me.id;
  connectGlobalWS();
  loadMatches();
}

function connectGlobalWS(){
  const wsUrl=(location.protocol==='https:'?'wss://':'ws://')+location.host+'/chat/ws/'+myId;
window._globalWs=new WebSocket(wsUrl);
  window._globalWs.onmessage=function(e){
    const data=JSON.parse(e.data);
    if(data.sender_id!==currentMatchId){
      const sender=matchesData.find(m=>m.id===data.sender_id);
      if(sender) showNotify(sender,data.message);
      addUnreadBadge(data.sender_id);
    } else {
      addMessage(data.message,'received',data.time);
    }
  };
  window._globalWs.onclose=()=>setTimeout(connectGlobalWS,3000);
}

function showNotify(sender,message){
  const av=document.getElementById('notifyAvatar');
  av.innerHTML=sender.photo&&sender.photo!=='default.jpg'
    ?`<img src="/static/uploads/${sender.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
    :(sender.gender==='female'?'👩':'👨');
  document.getElementById('notifyName').textContent=sender.name;
  document.getElementById('notifyMsg').textContent=message.length>40?message.substring(0,40)+'...':message;
  const n=document.getElementById('notify');
  n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'),4000);
}

function addUnreadBadge(senderId){
  const item=document.getElementById('match-'+senderId);
  if(!item) return;
  const av=item.querySelector('.match-avatar');
  let badge=av.querySelector('.unread-badge');
  if(!badge){badge=document.createElement('span');badge.className='unread-badge';badge.textContent='1';av.appendChild(badge);}
  else badge.textContent=parseInt(badge.textContent)+1;
  // nav badge
  const nb=document.getElementById('navBadge');
  nb.style.display='flex';nb.textContent=parseInt(nb.textContent||0)+1;
}

async function loadMatches(){
  try{
    const res=await fetch('/search/matches',{headers:{'Authorization':'Bearer '+token}});
    const matches=await res.json();
    matchesData=matches;
    const unreadRes=await fetch('/chat/unread_by_sender',{headers:{'Authorization':'Bearer '+token}});
    const unreadData=await unreadRes.json();
    renderMatches(matches,unreadData);
  }catch(e){console.log(e);}
}

function renderMatches(matches,unreadData={}){
  const list=document.getElementById('matchesList');
  if(!matches||!matches.length){
    list.innerHTML=`
      <div class="no-matches">
        <div class="no-matches-emoji">💫</div>
        <h3>Пока нет пар</h3>
        <p>Лайкай больше людей —<br>скоро появятся собеседники!</p>
        <button class="no-matches-btn" onclick="window.location.href='/dashboard'">🔥 Свайпать</button>
      </div>`;
    return;
  }
  list.innerHTML='';
  matches.forEach(m=>{
    const div=document.createElement('div');
    div.className='match-item';
    div.id='match-'+m.id;
    const av=m.photo&&m.photo!=='default.jpg'
      ?`<img src="/static/uploads/${m.photo}">`
      :(m.gender==='female'?'👩':'👨');
    const count=unreadData[m.id]||0;
    const badge=count>0?`<span class="unread-badge">${count}</span>`:'';
    div.innerHTML=`
      <div class="match-avatar">${av}${badge}<div class="online-ring"></div></div>
      <div class="match-info">
        <div class="match-name">${m.name}, ${m.age}</div>
        <div class="match-preview">📍 ${m.city||'Казахстан'}</div>
      </div>
      <div class="match-arrow">›</div>`;
    div.addEventListener('click',()=>openChat(m.id,m.name,m.gender,m.photo));
    list.appendChild(div);
  });
}

function openChat(userId,name,gender,photo){
  currentMatchId=userId;
  // Убрать бейдж
  const item=document.getElementById('match-'+userId);
  if(item){const badge=item.querySelector('.unread-badge');if(badge)badge.remove();}

  // Заполнить header
  document.getElementById('chatName').textContent=name;
  const av=document.getElementById('chatAvatar');
  if(photo&&photo!=='default.jpg'){av.innerHTML=`<img src="/static/uploads/${photo}">`;}
  else av.textContent=gender==='female'?'👩':'👨';

  // Показать чат
  document.getElementById('chatView').classList.add('active');
  loadHistory(userId);

  // Фокус на инпут
  setTimeout(()=>document.getElementById('messageInput').focus(),400);
}

function backToList(){
  document.getElementById('chatView').classList.remove('active');
  currentMatchId=null;
}

async function loadHistory(userId){
  try{
    const res=await fetch('/chat/history/'+userId,{headers:{'Authorization':'Bearer '+token}});
    const msgs=await res.json();
    const container=document.getElementById('messages');
    container.innerHTML='';
    if(!msgs.length){
      container.innerHTML=`<div class="empty-chat"><div class="empty-chat-emoji">💌</div><h3>Напиши первым!</h3><p>Начни общение —<br>возможно это судьба 💫</p></div>`;
      return;
    }
    let lastDate='';
    msgs.forEach(m=>{
      const d=new Date(m.created_at).toLocaleDateString('ru',{day:'numeric',month:'long'});
      if(d!==lastDate){
        const div=document.createElement('div');
        div.className='date-divider';div.textContent=d;
        container.appendChild(div);lastDate=d;
      }
      addMessage(m.content,m.sender_id===myId?'sent':'received',m.created_at);
    });
  }catch(e){
    document.getElementById('messages').innerHTML=`<div class="empty-chat"><div class="empty-chat-emoji">💌</div><h3>Напиши первым!</h3><p>Начни общение 💫</p></div>`;
  }
}

function addMessage(text,type,time){
  const container=document.getElementById('messages');
  // Убрать empty если есть
  const empty=container.querySelector('.empty-chat');
  if(empty)empty.remove();
  const div=document.createElement('div');
  div.className='msg '+type;
  const t=time?new Date(time).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}):'';
  div.innerHTML=escapeHtml(text)+'<div class="msg-time">'+t+'</div>';
  container.appendChild(div);
  container.scrollTop=container.scrollHeight;
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function sendMessage(){
  const input=document.getElementById('messageInput');
  const text=input.value.trim();
  if(!text||!currentMatchId) return;
  const ws=window._globalWs;
  if(ws&&ws.readyState===1){ws.send(JSON.stringify({receiver_id:currentMatchId,message:text}));}
  addMessage(text,'sent',new Date().toISOString());
  input.value='';
}

loadMe();
</script>
</body>
</html>
