<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Лайки — Zhanym</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff4d6d;--pink2:#ff85a1;--dark:#0d0d1a;--green:#06d6a0}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--dark);color:white;font-family:'Nunito',sans-serif;min-height:100%;padding-bottom:90px}

.page-header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:54px 20px 14px;
  background:rgba(13,13,26,.95);
  border-bottom:1px solid rgba(255,255,255,.07);
  backdrop-filter:blur(20px);
}
.page-title{font-size:24px;font-weight:900;letter-spacing:-.5px}
.page-title span{color:var(--pink)}
.page-sub{color:rgba(255,255,255,.35);font-size:13px;font-weight:600;margin-top:2px}

.count-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,77,109,.1);color:var(--pink);
  padding:6px 14px;border-radius:50px;
  font-size:13px;font-weight:800;
  border:1px solid rgba(255,77,109,.2);
  margin-top:10px;
}

.container{padding:0 16px;margin-top:140px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.card{
  border-radius:20px;overflow:hidden;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  position:relative;transition:.2s;
}
.card:active{transform:scale(.97)}
.card-photo{
  width:100%;aspect-ratio:3/4;
  display:flex;align-items:center;justify-content:center;
  font-size:60px;
  background:linear-gradient(135deg,#1a0a2e,#2d1040);
  position:relative;overflow:hidden;
}
.card-photo img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.card-gradient{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.95) 100%);
}
.card-info{position:absolute;bottom:0;left:0;right:0;padding:12px}
.card-name{font-size:15px;font-weight:900}
.card-city{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px;font-weight:600}
.card-actions{display:flex;gap:6px;margin-top:8px}
.btn-like{
  flex:1;padding:9px 6px;
  background:linear-gradient(135deg,var(--pink),var(--pink2));
  color:white;border:none;border-radius:50px;
  font-size:12px;font-weight:800;cursor:pointer;
  font-family:'Nunito',sans-serif;transition:.2s;
}
.btn-like:active{transform:scale(.95)}
.btn-like.liked{background:rgba(255,255,255,.1);color:rgba(255,255,255,.4)}
.heart-badge{
  position:absolute;top:10px;right:10px;
  background:linear-gradient(135deg,var(--pink),var(--pink2));
  color:white;font-size:14px;
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(255,77,109,.5);z-index:2;
}

.empty{
  text-align:center;padding:60px 20px;
  display:flex;flex-direction:column;align-items:center;
  margin-top:60px;
}
.empty-emoji{font-size:64px;margin-bottom:16px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.empty h3{font-size:20px;font-weight:900;margin-bottom:8px}
.empty p{color:rgba(255,255,255,.35);font-size:14px;line-height:1.6}
.empty-btn{
  margin-top:24px;padding:14px 28px;
  background:linear-gradient(135deg,var(--pink),var(--pink2));
  border:none;border-radius:50px;color:white;
  font-size:15px;font-weight:800;cursor:pointer;
  font-family:'Nunito',sans-serif;
}

/* MATCH TOAST */
.toast{
  position:fixed;top:60px;left:16px;right:16px;
  background:linear-gradient(135deg,rgba(255,77,109,.95),rgba(255,133,161,.95));
  color:white;padding:14px 20px;border-radius:20px;
  font-size:15px;font-weight:800;z-index:999;
  transform:translateY(-120px);transition:.4s cubic-bezier(.34,1.56,.64,1);
  text-align:center;backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(255,77,109,.4);
}
.toast.show{transform:translateY(0)}

.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;height:80px;
  background:rgba(13,13,26,.95);
  border-top:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:space-around;
  padding:0 10px;backdrop-filter:blur(20px);z-index:100;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  text-decoration:none;color:rgba(255,255,255,.35);
  font-size:10px;font-weight:700;padding:6px 12px;
  border-radius:16px;transition:.2s;
  text-transform:uppercase;letter-spacing:.5px;
}
.nav-item.active{color:var(--pink)}
.nav-item.active .nav-icon{background:rgba(255,77,109,.15);border-color:rgba(255,77,109,.3)}
.nav-icon{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid transparent;transition:.2s}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="page-header">
  <div class="page-title">💛 <span>Лайки</span></div>
  <div class="page-sub">Люди которым ты понравился</div>
  <div class="count-pill" id="countPill" style="display:none">❤️ <span id="countNum">0</span> человек лайкнули тебя</div>
</div>

<div class="container">
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    <div class="empty-emoji">💫</div>
    <h3>Пока никто не лайкнул</h3>
    <p>Свайпай больше —<br>и лайки придут!</p>
    <button class="empty-btn" onclick="window.location.href='/dashboard'">🔥 Свайпать</button>
  </div>
</div>

<nav class="bottom-nav">
  <a href="/dashboard" class="nav-item"><div class="nav-icon">🔥</div>Лента</a>
  <a href="/likes" class="nav-item active"><div class="nav-icon">💛</div>Лайки</a>
  <a href="/chat" class="nav-item"><div class="nav-icon">💬</div>Чат</a>
  <a href="/profile" class="nav-item"><div class="nav-icon">👤</div>Профиль</a>
</nav>

<script>
const token=localStorage.getItem('token');
if(!token) window.location.href='/login';
let likedBack=new Set();

async function loadLikes(){
  const res=await fetch('/search/who_liked_me',{headers:{'Authorization':'Bearer '+token}});
  if(res.status===401){window.location.href='/login';return;}
  const users=await res.json();
  if(!users.length){document.getElementById('empty').style.display='flex';return;}
  document.getElementById('countPill').style.display='inline-flex';
  document.getElementById('countNum').textContent=users.length;
  document.getElementById('grid').innerHTML=users.map(u=>`
    <div class="card">
      <div class="heart-badge">❤️</div>
      <div class="card-photo">
        ${u.photo&&u.photo!=='default.jpg'
          ?`<img src="/static/uploads/${u.photo}">`
          :`<span>${u.gender==='female'?'👩':'👨'}</span>`}
        <div class="card-gradient"></div>
        <div class="card-info">
          <div class="card-name">${u.name}, ${u.age}</div>
          <div class="card-city">📍 ${u.city||''}</div>
          <div class="card-actions">
            <button class="btn-like" id="like-${u.id}" onclick="likeBack(${u.id})">❤️ Лайкнуть</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

async function likeBack(userId){
  const btn=document.getElementById('like-'+userId);
  if(likedBack.has(userId)) return;
  const res=await fetch('/search/like/'+userId,{method:'POST',headers:{'Authorization':'Bearer '+token}});
  const data=await res.json();
  likedBack.add(userId);
  btn.textContent='✓ Лайкнул';
  btn.classList.add('liked');
  showToast(data.message&&data.message.includes('Пара')?'🎉 Это матч! Пишите друг другу!':'❤️ Лайк отправлен!');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

loadLikes();
</script>
</body>
</html>
