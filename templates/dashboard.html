<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zhanym</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff4d6d;
  --pink2:#ff85a1;
  --dark:#0d0d1a;
  --card:#16162a;
  --green:#06d6a0;
  --blue:#4cc9f0;
  --gold:#ffd60a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--dark);color:white}

.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:14px 20px 10px;
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(to bottom,rgba(13,13,26,1),rgba(13,13,26,0));
}
.logo{font-size:26px;font-weight:900;color:white;letter-spacing:-1px}
.logo span{color:var(--pink)}
.header-icons{display:flex;gap:8px;align-items:center}
.icon-btn{
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;position:relative;transition:.2s;
}
.icon-btn:active{transform:scale(.9)}
.badge{
  position:absolute;top:-2px;right:-2px;
  background:var(--pink);color:white;
  font-size:10px;font-weight:900;
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--dark);
}

.main{
  position:fixed;top:0;left:0;right:0;bottom:80px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:70px 16px 10px;
}

.card-stack{
  width:100%;max-width:380px;
  position:relative;flex:1;
  display:flex;align-items:center;justify-content:center;
}

.card{
  position:absolute;width:100%;
  border-radius:24px;overflow:hidden;
  box-shadow:0 25px 60px rgba(0,0,0,.6);
  cursor:grab;touch-action:none;
  will-change:transform;
  background:var(--card);
  border:1px solid rgba(255,255,255,.08);
}
.card:active{cursor:grabbing}
.card-inner{
  position:relative;
  height:calc(100vh - 210px);
  max-height:580px;min-height:400px;
}
.card-img{
  width:100%;height:100%;
  background:linear-gradient(135deg,#1a0a2e,#2d1040);
  position:relative;overflow:hidden;
}
.card-img img{
  width:100%;height:100%;
  object-fit:cover;
  object-position:center top;
  position:absolute;inset:0;
  display:block;

}
.card-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.card-gradient{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 35%,rgba(0,0,0,.2) 60%,rgba(0,0,0,.95) 100%);
}
.photo-dots{
  position:absolute;top:12px;left:12px;right:12px;
  display:flex;gap:4px;z-index:5;
}
.photo-dot{flex:1;height:3px;border-radius:3px;background:rgba(255,255,255,.3)}
.photo-dot.active{background:white}

.card-info{position:absolute;bottom:0;left:0;right:0;padding:20px;z-index:5;}
.card-name{font-size:28px;font-weight:900;letter-spacing:-.5px;display:flex;align-items:baseline;gap:10px;}
.card-age{font-size:22px;font-weight:700;opacity:.85}
.card-location{display:flex;align-items:center;gap:5px;color:rgba(255,255,255,.7);font-size:13px;margin-top:4px;font-weight:600;}
.card-bio{color:rgba(255,255,255,.6);font-size:13px;margin-top:8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.card-tag{padding:4px 12px;border-radius:50px;background:rgba(255,255,255,.12);font-size:11px;font-weight:700;border:1px solid rgba(255,255,255,.15);}

.swipe-label{
  position:absolute;top:50%;left:50%;
  font-size:32px;font-weight:900;letter-spacing:3px;
  padding:12px 28px;border-radius:16px;border:4px solid;
  opacity:0;z-index:10;pointer-events:none;text-transform:uppercase;
  transition:opacity .1s;white-space:nowrap;
}
.swipe-like-label{
  color:#06d6a0;border-color:#06d6a0;background:rgba(6,214,160,.1);
  transform:translate(-50%,-50%) rotate(-15deg);
}
.swipe-skip-label{
  color:#ff4d6d;border-color:#ff4d6d;background:rgba(255,77,109,.1);
  transform:translate(-50%,-50%) rotate(15deg);
}

.actions{
  display:flex;justify-content:center;align-items:center;
  gap:14px;padding:12px 0 0;
  width:100%;max-width:380px;
}
.act-btn{
  border:none;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s,box-shadow .2s;
}
.act-btn:active{transform:scale(.88)!important}
.act-back{width:52px;height:52px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);font-size:18px;}
.act-skip{width:64px;height:64px;background:white;box-shadow:0 8px 25px rgba(255,77,109,.35);font-size:26px;color:#ff4d6d;font-weight:900;}
.act-super{width:54px;height:54px;background:linear-gradient(135deg,#4cc9f0,#4361ee);box-shadow:0 8px 20px rgba(76,201,240,.4);font-size:20px;}
.act-like{width:64px;height:64px;background:linear-gradient(135deg,#ff4d6d,#ff85a1);box-shadow:0 8px 25px rgba(255,77,109,.5);font-size:26px;}
.act-boost{width:52px;height:52px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);font-size:18px;}

.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;height:80px;
  background:rgba(13,13,26,.95);
  border-top:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:space-around;
  padding:0 10px;backdrop-filter:blur(20px);z-index:100;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  text-decoration:none;color:rgba(255,255,255,.35);
  font-size:10px;font-weight:700;
  padding:6px 12px;border-radius:16px;transition:.2s;
  position:relative;letter-spacing:.5px;text-transform:uppercase;
}
.nav-item.active{color:var(--pink)}
.nav-item.active .nav-icon{background:rgba(255,77,109,.15);border-color:rgba(255,77,109,.3);}
.nav-icon{
  width:42px;height:42px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;border:1px solid transparent;transition:.2s;
}
.nav-badge{
  position:absolute;top:4px;right:8px;
  background:var(--pink);color:white;
  font-size:9px;font-weight:900;
  min-width:16px;height:16px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  padding:0 4px;border:2px solid var(--dark);
}

.empty{text-align:center;padding:40px 20px;display:flex;flex-direction:column;align-items:center;}
.empty-emoji{font-size:72px;margin-bottom:20px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.empty h2{font-size:24px;font-weight:900;margin-bottom:8px}
.empty p{color:rgba(255,255,255,.4);font-size:14px;line-height:1.6}
.empty-btn{
  margin-top:24px;padding:14px 32px;
  background:linear-gradient(135deg,var(--pink),var(--pink2));
  border:none;border-radius:50px;color:white;font-size:15px;font-weight:800;
  cursor:pointer;font-family:'Nunito',sans-serif;
}

.popup-overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.85);
  align-items:center;justify-content:center;flex-direction:column;
  backdrop-filter:blur(20px);
}
.popup-overlay.show{display:flex;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.match-card{
  width:90%;max-width:360px;
  background:linear-gradient(135deg,#1a0a2e,#2d1040);
  border-radius:32px;padding:36px 28px;text-align:center;
  border:1px solid rgba(255,77,109,.3);
  box-shadow:0 0 60px rgba(255,77,109,.2);
  animation:popUp .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popUp{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.match-hearts{font-size:64px;margin-bottom:16px;animation:heartbeat 1.5s ease-in-out infinite}
@keyframes heartbeat{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.match-title{
  font-size:32px;font-weight:900;margin-bottom:6px;
  background:linear-gradient(135deg,#ff4d6d,#ff85a1);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.match-sub{color:rgba(255,255,255,.6);font-size:15px;margin-bottom:28px}
.match-avatars{display:flex;justify-content:center;align-items:center;gap:10px;margin-bottom:28px;font-size:52px;}
.match-btn{
  width:100%;padding:16px;border:none;border-radius:50px;
  font-size:16px;font-weight:800;cursor:pointer;
  font-family:'Nunito',sans-serif;margin-bottom:10px;transition:.2s;
}
.match-btn:active{transform:scale(.97)}
.match-btn-main{background:linear-gradient(135deg,#ff4d6d,#ff85a1);color:white;box-shadow:0 8px 25px rgba(255,77,109,.4)}
.match-btn-sec{background:rgba(255,255,255,.08);color:white;border:1px solid rgba(255,255,255,.15)}

.premium-card{
  width:90%;max-width:360px;
  background:linear-gradient(135deg,#1a1200,#2d2000);
  border-radius:32px;padding:32px 28px;text-align:center;
  border:1px solid rgba(255,214,10,.3);
  box-shadow:0 0 60px rgba(255,214,10,.15);
  animation:popUp .4s cubic-bezier(.34,1.56,.64,1);
}
.premium-icon{font-size:60px;margin-bottom:12px}
.premium-title{
  font-size:28px;font-weight:900;margin-bottom:6px;
  background:linear-gradient(135deg,#ffd60a,#ffb700);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.premium-sub{color:rgba(255,255,255,.5);font-size:14px;margin-bottom:20px}
.premium-features{background:rgba(255,255,255,.05);border-radius:16px;padding:16px;margin-bottom:20px;text-align:left;}
.premium-feature{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;color:rgba(255,255,255,.8);padding:6px 0;}
.premium-price{font-size:36px;font-weight:900;color:white;margin-bottom:4px;}
.premium-price span{font-size:16px;opacity:.5;font-weight:600}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Zha<span>nym</span></div>
  <div class="header-icons">
    <div class="icon-btn" onclick="window.location.href='/search'">🔍</div>
    <div class="icon-btn" id="chatIconBtn" onclick="window.location.href='/chat'">
      💬
      <div class="badge" id="chatBadge" style="display:none">0</div>
    </div>
  </div>
</div>

<div class="main">
  <div class="card-stack" id="cardStack"></div>
  <div class="actions" id="actions" style="display:none">
    <button class="act-btn act-back" onclick="goBack()">↩️</button>
    <button class="act-btn act-skip" onclick="skipAnim()">✕</button>
    <button class="act-btn act-super" onclick="superLike()">⭐</button>
    <button class="act-btn act-like" onclick="likeAnim()">❤️</button>
    <button class="act-btn act-boost" onclick="boostClick()">⚡</button>
  </div>
</div>

<nav class="bottom-nav">
  <a href="/dashboard" class="nav-item active">
    <div class="nav-icon">🔥</div>Лента
  </a>
  <a href="/search" class="nav-item">
    <div class="nav-icon">🔍</div>Поиск
  </a>
  <a href="/likes" class="nav-item">
    <div class="nav-icon">💛</div>Лайки
  </a>
  <a href="/chat" class="nav-item" id="chatNav">
    <div class="nav-icon">💬</div>Чат
    <div class="nav-badge" id="chatNavBadge" style="display:none">0</div>
  </a>
  <a href="/profile" class="nav-item">
    <div class="nav-icon">👤</div>Профиль
  </a>
</nav>

<!-- MATCH POPUP -->
<div class="popup-overlay" id="matchPopup">
  <div class="match-card">
    <div class="match-hearts">💞</div>
    <div class="match-title">Это Пара!</div>
    <div class="match-sub">Вы понравились друг другу 🎉</div>
    <div class="match-avatars" id="matchAvatars">👨 💕 👩</div>
    <button class="match-btn match-btn-main" onclick="goToChat()">💬 Написать сейчас</button>
    <button class="match-btn match-btn-sec" onclick="closeMatch()">Продолжить свайпать</button>
  </div>
</div>

<!-- PREMIUM POPUP -->
<div class="popup-overlay" id="premiumPopup">
  <div class="premium-card">
    <div class="premium-icon">👑</div>
    <div class="premium-title">Zhanym Premium</div>
    <div class="premium-sub" id="premiumFeatureText">Разблокируй все возможности</div>
    <div class="premium-features">
      <div class="premium-feature">⭐ Безлимитные суперлайки</div>
      <div class="premium-feature">⚡ Буст профиля каждый день</div>
      <div class="premium-feature">👁 Кто тебя лайкнул</div>
      <div class="premium-feature">🔄 Отмена последнего свайпа</div>
    </div>
    <div class="premium-price">от 2000 ₸<span>/нед</span></div>
    <button class="match-btn match-btn-main" style="margin-top:16px" onclick="window.location.href='/subscription'">👑 Оформить подписку</button>
    <button class="match-btn match-btn-sec" onclick="closePremium()">Позже</button>
  </div>
</div>

<script>
const token = localStorage.getItem('token');
if(!token) window.location.href='/login';

let users=[], currentIndex=0, currentUser=null;

async function loadUsers(){
  try{
    const res = await fetch('/search/', {headers:{'Authorization':'Bearer '+token}});
    if(res.status===401){window.location.href='/login';return;}
    users = await res.json();
    currentIndex=0;
    showCard();
  }catch(e){console.log(e);}
}

function getEmoji(g){return g==='female'?'👩':'👨'}

function showCard(){
  const stack = document.getElementById('cardStack');
  const actions = document.getElementById('actions');

  if(currentIndex>=users.length){
    actions.style.display='none';
    stack.innerHTML=`
      <div class="empty">
        <div class="empty-emoji">💫</div>
        <h2>Пока все!</h2>
        <p>Новые люди появятся совсем скоро.<br>Загляни позже!</p>
        <button class="empty-btn" onclick="loadUsers()">🔄 Обновить</button>
      </div>`;
    return;
  }

  currentUser = users[currentIndex];
  actions.style.display='flex';

  const photoHTML = currentUser.photo && currentUser.photo!=='default.jpg'
    ? `<img src="/static/uploads/${currentUser.photo}" style="width:100%;height:100%;object-fit:cover;object-position:center top;position:absolute;inset:0;display:block;">`
    : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:100px;background:linear-gradient(135deg,#1a0a2e,#2d1040)">${getEmoji(currentUser.gender)}</div>`;

  const tagsHTML = [currentUser.goal, currentUser.zodiac, currentUser.sport]
    .filter(Boolean).slice(0,3)
    .map(t=>`<span class="card-tag">${t}</span>`).join('');

  stack.innerHTML=`
    <div class="card" id="card">
      <div class="swipe-label swipe-like-label" id="swipeLike">ЛАЙК ❤️</div>
      <div class="swipe-label swipe-skip-label" id="swipeSkip">ПРОПУСК ✕</div>
      <div class="card-inner">
        <div class="card-img">${photoHTML}</div>
        <div class="card-gradient"></div>
        <div class="photo-dots">
          <div class="photo-dot active"></div>
          <div class="photo-dot"></div>
          <div class="photo-dot"></div>
        </div>
        <div class="card-info">
          <div class="card-name">${currentUser.name}<span class="card-age">${currentUser.age}</span></div>
          <div class="card-location">📍 ${currentUser.city||'Казахстан'}</div>
          ${currentUser.bio?`<div class="card-bio">${currentUser.bio}</div>`:''}
          ${tagsHTML?`<div class="card-tags">${tagsHTML}</div>`:''}
        </div>
      </div>
    </div>`;

  initSwipe();
}

function initSwipe(){
  const card = document.getElementById('card');
  if(!card) return;
  let startX=0, isDragging=false, currentX=0;

  const onStart=(x)=>{startX=x;isDragging=true;card.style.transition='none';}
  const onMove=(x)=>{
    if(!isDragging) return;
    currentX=x-startX;
    card.style.transform=`translateX(${currentX}px) rotate(${currentX*.05}deg)`;
    const l=document.getElementById('swipeLike');
    const s=document.getElementById('swipeSkip');
    if(l) l.style.opacity=currentX>30?Math.min((currentX-30)/60,1):0;
    if(s) s.style.opacity=currentX<-30?Math.min((-currentX-30)/60,1):0;
  };
  const onEnd=()=>{
    if(!isDragging) return;
    isDragging=false;
    card.style.transition='transform .35s ease';
    if(currentX>90) likeAnim();
    else if(currentX<-90) skipAnim();
    else card.style.transform='';
    currentX=0;
  };

  card.addEventListener('mousedown',e=>{onStart(e.clientX);e.preventDefault();});
  document.addEventListener('mousemove',e=>onMove(e.clientX));
  document.addEventListener('mouseup',onEnd);
  card.addEventListener('touchstart',e=>onStart(e.touches[0].clientX),{passive:true});
  card.addEventListener('touchmove',e=>{onMove(e.touches[0].clientX);e.preventDefault();},{passive:false});
  card.addEventListener('touchend',onEnd);
}

function skipAnim(){
  const card=document.getElementById('card');
  if(card){card.style.transition='transform .35s ease,opacity .35s ease';card.style.transform='translateX(-120%) rotate(-30deg)';card.style.opacity='0';}
  currentIndex++;setTimeout(showCard,350);
}

function likeAnim(){
  const card=document.getElementById('card');
  if(card){card.style.transition='transform .35s ease,opacity .35s ease';card.style.transform='translateX(120%) rotate(30deg)';card.style.opacity='0';}
  likeUser();
}

async function likeUser(){
  if(!currentUser) return;
  try{
    const res=await fetch('/search/like/'+currentUser.id,{method:'POST',headers:{'Authorization':'Bearer '+token}});
    const data=await res.json();
    if(data.message&&data.message.includes('Пара')){
      setTimeout(()=>document.getElementById('matchPopup').classList.add('show'),350);
    } else {
      currentIndex++;setTimeout(showCard,350);
    }
  }catch(e){currentIndex++;setTimeout(showCard,350);}
}

function superLike(){
  if(!currentUser) return;
  const today=new Date().toDateString();
  if(localStorage.getItem('lastSuperLike')===today){showPremiumPopup('⭐ Суперлайк доступен 1 раз в день');return;}
  localStorage.setItem('lastSuperLike',today);
  const card=document.getElementById('card');
  if(card){card.style.transition='transform .4s ease,opacity .4s ease';card.style.transform='translateY(-120%) scale(.8)';card.style.opacity='0';}
  likeUser();
}

function goBack(){if(currentIndex>0){currentIndex--;showCard();}}
function boostClick(){showPremiumPopup('⚡ Буст профиля — только для Premium');}
function showPremiumPopup(t){document.getElementById('premiumFeatureText').textContent=t;document.getElementById('premiumPopup').classList.add('show');}
function closePremium(){document.getElementById('premiumPopup').classList.remove('show');}
function closeMatch(){document.getElementById('matchPopup').classList.remove('show');currentIndex++;showCard();}
function goToChat(){window.location.href='/chat';}

async function loadUnread(){
  try{
    const res=await fetch('/chat/unread',{headers:{'Authorization':'Bearer '+token}});
    const data=await res.json();
    const b=document.getElementById('chatBadge');
    const nb=document.getElementById('chatNavBadge');
    if(data.count>0){b.textContent=data.count;b.style.display='flex';nb.textContent=data.count;nb.style.display='flex';}
    else{b.style.display='none';nb.style.display='none';}
  }catch(e){}
}

loadUsers();
loadUnread();
setInterval(loadUnread,10000);
</script>
</body>
</html>
