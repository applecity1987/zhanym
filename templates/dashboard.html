<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zhanym — Лента</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a0a1a;height:100vh;display:flex;flex-direction:column;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* HEADER */
.header{background:rgba(255,255,255,.03);padding:12px 25px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.08);backdrop-filter:blur(20px);position:fixed;top:0;width:100%;z-index:50}
.logo{font-size:22px;font-weight:bold;color:white;text-decoration:none}
.nav a{margin-left:12px;text-decoration:none;color:rgba(255,255,255,.5);font-size:13px;padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.1);transition:.2s}
.nav a:hover{background:rgba(255,255,255,.1);color:white}

/* MAIN */
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:70px 20px 150px;position:relative;z-index:5}

/* CARD WRAP */
.card-wrap{width:100%;max-width:420px;position:relative;perspective:1000px}

/* CARD */
.card{border-radius:28px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 40px rgba(255,107,157,.15);cursor:grab;transition:transform .3s;user-select:none;border:1px solid rgba(255,255,255,.1)}
.card:active{cursor:grabbing}
.card-photo{width:100%;height:560px;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:120px;background:linear-gradient(135deg,#1a0a2e,#2d1b3d,#ff6b9d22)}
.card-photo img{width:100%;height:100%;object-fit:cover}

/* GLASS OVERLAY */
.card-glass{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(10,5,25,.97));pointer-events:none}

/* CARD INFO */
.card-info{position:absolute;bottom:0;left:0;right:0;padding:25px}
.card-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,230,120,.2);color:#00e676;font-size:12px;font-weight:bold;padding:5px 12px;border-radius:20px;margin-bottom:12px;border:1px solid rgba(0,230,120,.3);backdrop-filter:blur(10px)}
.card-name{font-size:34px;font-weight:900;color:white;text-shadow:0 2px 20px rgba(0,0,0,.8);letter-spacing:-0.5px}
.card-bio{color:rgba(255,255,255,.65);font-size:14px;margin-top:8px;line-height:1.6}

/* PROGRESS */
.progress-bar{position:absolute;top:16px;left:16px;right:16px;display:flex;gap:5px;z-index:10}
.progress-dot{flex:1;height:3px;background:rgba(255,255,255,.25);border-radius:3px}
.progress-dot.active{background:white;box-shadow:0 0 8px rgba(255,255,255,.8)}

/* SWIPE LABELS */
.swipe-like{position:absolute;top:40px;left:25px;background:rgba(0,230,120,.15);color:#00e676;font-size:20px;font-weight:900;padding:10px 22px;border-radius:14px;border:3px solid #00e676;opacity:0;transform:rotate(-15deg);transition:.15s;letter-spacing:2px;backdrop-filter:blur(10px)}
.swipe-skip{position:absolute;top:40px;right:25px;background:rgba(255,60,80,.15);color:#ff3c50;font-size:20px;font-weight:900;padding:10px 22px;border-radius:14px;border:3px solid #ff3c50;opacity:0;transform:rotate(15deg);transition:.15s;letter-spacing:2px;backdrop-filter:blur(10px)}

/* ACTIONS */
.actions{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);display:flex;justify-content:center;align-items:center;gap:16px;padding:14px 32px;background:rgba(10,10,26,.7);border-radius:50px;backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);z-index:50;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.btn-action{border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.25s;box-shadow:0 5px 20px rgba(0,0,0,.4)}
.btn-action:hover{transform:scale(1.15)}
.btn-back{width:52px;height:52px;background:rgba(255,255,255,.1);font-size:20px;border:1px solid rgba(255,255,255,.15)}
.btn-skip{width:68px;height:68px;background:white;font-size:28px;color:#ff3c50;box-shadow:0 5px 25px rgba(255,60,80,.3)}
.btn-super{width:56px;height:56px;background:linear-gradient(135deg,#4facfe,#00f2fe);font-size:22px;box-shadow:0 5px 25px rgba(79,172,254,.4)}
.btn-like{width:68px;height:68px;background:linear-gradient(135deg,#ff6b6b,#fd79a8);font-size:28px;box-shadow:0 5px 25px rgba(255,107,107,.5)}
.btn-boost{width:52px;height:52px;background:rgba(255,255,255,.1);font-size:20px;border:1px solid rgba(255,255,255,.15)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,26,.9);display:flex;justify-content:center;gap:40px;padding:12px 0 16px;border-top:1px solid rgba(255,255,255,.08);z-index:40;backdrop-filter:blur(20px)}
.bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:rgba(255,255,255,.4);font-size:11px;transition:.2s}
.bottom-nav a.active,.bottom-nav a:hover{color:#ff6b9d}
.bottom-nav a span{font-size:22px}

/* EMPTY */
.empty{text-align:center;color:rgba(255,255,255,.5);padding:40px 20px}
.empty-icon{font-size:80px;margin-bottom:20px;animation:float 3s ease-in-out infinite;display:block}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.empty h2{font-size:26px;margin-bottom:10px;color:white}

/* MATCH POPUP */
.match-popup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:center;justify-content:center;flex-direction:column;backdrop-filter:blur(20px)}
.match-popup.show{display:flex;animation:popIn .4s ease}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.match-glow{position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(255,107,157,.3),transparent);border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.match-title{font-size:52px;font-weight:900;color:white;margin-bottom:10px;position:relative;z-index:1;text-shadow:0 0 30px rgba(255,107,157,.8)}
.match-sub{color:rgba(255,255,255,.7);font-size:18px;margin-bottom:30px;position:relative;z-index:1}
.match-avatars{display:flex;gap:20px;margin-bottom:35px;font-size:80px;position:relative;z-index:1}
.match-btn{padding:16px 48px;background:linear-gradient(135deg,#ff6b6b,#fd79a8);color:white;border:none;border-radius:50px;font-size:18px;font-weight:bold;cursor:pointer;margin:6px;position:relative;z-index:1;box-shadow:0 8px 25px rgba(255,107,107,.4);transition:.2s}
.match-btn:hover{transform:translateY(-2px)}
.match-btn-chat{background:transparent;border:2px solid rgba(255,255,255,.4);color:white;box-shadow:none}

/* FILTERS скрыты но работают */
.filters{display:none}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<script>
const c = document.getElementById('stars'), ctx = c.getContext('2d');
c.width = window.innerWidth; c.height = window.innerHeight;

const stars = Array.from({length:350}, () => ({
  x: Math.random()*c.width - c.width/2,
  y: Math.random()*c.height - c.height/2,
  z: Math.random()*c.width, pz:0
}));

const nebula = [
  {x:c.width*.2, y:c.height*.3, r:250, hue:280, o:.05},
  {x:c.width*.8, y:c.height*.7, r:300, hue:320, o:.04},
  {x:c.width*.5, y:c.height*.5, r:200, hue:260, o:.03},
];

function drawSpace(){
  ctx.fillStyle='rgba(10,10,26,.25)';
  ctx.fillRect(0,0,c.width,c.height);
  nebula.forEach(n=>{
    const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    g.addColorStop(0,`hsla(${n.hue},80%,60%,${n.o})`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.beginPath();
    ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
  });
  stars.forEach(s=>{
    s.pz=s.z; s.z-=2.5;
    if(s.z<=0){s.x=Math.random()*c.width-c.width/2;s.y=Math.random()*c.height-c.height/2;s.z=c.width;s.pz=s.z;}
    const sx=(s.x/s.z)*c.width+c.width/2;
    const sy=(s.y/s.z)*c.height+c.height/2;
    const px=(s.x/s.pz)*c.width+c.width/2;
    const py=(s.y/s.pz)*c.height+c.height/2;
    const size=Math.max(.5,(1-s.z/c.width)*3);
    const bright=1-s.z/c.width;
    ctx.strokeStyle=`rgba(255,255,255,${bright})`;
    ctx.lineWidth=size;
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(sx,sy); ctx.stroke();
  });
  requestAnimationFrame(drawSpace);
}
drawSpace();
window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight;});
</script>

<div class="header">
  <a href="/" class="logo">🌹 Zhanym</a>
  <div class="nav">
    <a href="/chat" id="chatLink">💬 Чат</a>
    <a href="/profile">👤 Профиль</a>
    <a href="#" onclick="logout()">Выйти</a>
  </div>
</div>

<div class="filters">
  <select id="gender"><option value="">Все</option><option value="male">Мужчины</option><option value="female">Женщины</option></select>
  <select id="city_filter"><option value="">Все города</option></select>
  <button onclick="loadUsers()">Найти</button>
</div>

<div class="main">
  <div class="card-wrap">
    <div id="cards"></div>
  </div>
</div>

<div class="actions" id="actions" style="display:none">
  <button class="btn-action btn-back" onclick="goBack()" title="Вернуть">↩️</button>
  <button class="btn-action btn-skip" onclick="skip()" title="Пропустить">✕</button>
  <button class="btn-action btn-super" onclick="superLike()" title="Суперлайк">⭐</button>
  <button class="btn-action btn-like" onclick="likeUser()" title="Лайк">❤️</button>
  <button class="btn-action btn-boost" onclick="boostClick()" title="Буст">⚡</button>

</div>

<div class="bottom-nav">
  <a href="/dashboard" class="active"><span>🔥</span>Свайпить</a>
  <a href="/search"><span>🔍</span>Поиск</a>
  <a href="/likes"><span>💛</span>Лайки</a>
  <a href="/chat"><span>✍🏻</span>Написать</a>
  <a href="/profile"><span>👤</span>Профиль</a>
</div>

<div class="match-popup" id="matchPopup">
  <div class="match-glow"></div>
  <div class="match-title">💞 Это Пара!</div>
  <div class="match-sub">Вы понравились друг другу!</div>
  <div class="match-avatars" id="matchAvatars">👨💞👩</div>
  <button class="match-btn match-btn-chat" onclick="goToChat()">💬 Написать</button>
  <button class="match-btn" onclick="closeMatch()">Продолжить ✨</button>
</div>

<script>
const token = localStorage.getItem('token');
if(!token) window.location.href = '/login';
let users = [], currentIndex = 0, currentUser = null;

async function loadUsers() {
  const gender = document.getElementById('gender').value;
  const city = document.getElementById('city_filter').value;
  let url = '/search/?';
  if(gender) url += 'gender='+gender+'&';
  if(city) url += 'city='+encodeURIComponent(city)+'&';
  try {
    const res = await fetch(url, {headers:{'Authorization':'Bearer '+token}});
    if(res.status===401){ window.location.href='/login'; return; }
    users = await res.json();
    currentIndex = 0;
    showCard();
  } catch(e){ console.log(e); }
}

function getEmoji(gender){ return gender==='female'?'👩':'👨'; }

function showCard() {
  const container = document.getElementById('cards');
  const actions = document.getElementById('actions');
  if(currentIndex >= users.length){
    actions.style.display = 'none';
    container.innerHTML = `
      <div class="empty">
        <span class="empty-icon">💫</span>
        <h2>Никого нет</h2>
        <p style="color:rgba(255,255,255,.4)">Попробуй изменить фильтры<br>или зайди позже</p>
      </div>`;
    return;
  }
  currentUser = users[currentIndex];
  actions.style.display = 'flex';

  const photoHTML = currentUser.photo && currentUser.photo !== 'default.jpg'
    ? `<img src="/static/uploads/${currentUser.photo}" style="width:100%;height:100%;object-fit:cover">`
    : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:130px;background:linear-gradient(135deg,#1a0a2e,#3d1b4d,#ff6b9d22)">${getEmoji(currentUser.gender)}</div>`;

  container.innerHTML = `
    <div class="card" id="card">
      <div class="swipe-like" id="swipeLike">ЛАЙК ❤️</div>
      <div class="swipe-skip" id="swipeSkip">ПРОПУСК ✕</div>
      <div class="progress-bar">
        <div class="progress-dot active"></div>
        <div class="progress-dot"></div>
        <div class="progress-dot"></div>
      </div>
      <div class="card-photo">${photoHTML}</div>
      <div class="card-glass"></div>
      <div class="card-info">
        <div class="card-badge">📍 ${currentUser.city||'Казахстан'}</div>
        <div class="card-name">${currentUser.name}, ${currentUser.age}</div>
        <div class="card-bio">${currentUser.bio||''}</div>
      </div>
    </div>`;

  initSwipe();
}

function initSwipe() {
  const card = document.getElementById('card');
  let startX = 0, isDragging = false, currentX = 0;

  card.addEventListener('mousedown', e => { startX = e.clientX; isDragging = true; });
  document.addEventListener('mousemove', e => {
    if(!isDragging) return;
    currentX = e.clientX - startX;
    card.style.transform = `translateX(${currentX}px) rotate(${currentX*0.04}deg)`;
    document.getElementById('swipeLike').style.opacity = currentX > 30 ? Math.min((currentX-30)/50,1) : 0;
    document.getElementById('swipeSkip').style.opacity = currentX < -30 ? Math.min((-currentX-30)/50,1) : 0;
  });
  document.addEventListener('mouseup', () => {
    if(!isDragging) return;
    isDragging = false;
    if(currentX > 80){ animateCard('right'); likeUser(); }
    else if(currentX < -80){ animateCard('left'); skip(); }
    else { card.style.transform = ''; }
    currentX = 0;
  });

  card.addEventListener('touchstart', e => { startX = e.touches[0].clientX; isDragging = true; });
  card.addEventListener('touchmove', e => {
    if(!isDragging) return;
    currentX = e.touches[0].clientX - startX;
    card.style.transform = `translateX(${currentX}px) rotate(${currentX*0.04}deg)`;
    document.getElementById('swipeLike').style.opacity = currentX > 30 ? Math.min((currentX-30)/50,1) : 0;
    document.getElementById('swipeSkip').style.opacity = currentX < -30 ? Math.min((-currentX-30)/50,1) : 0;
  });
  card.addEventListener('touchend', () => {
    if(!isDragging) return;
    isDragging = false;
    if(currentX > 80){ animateCard('right'); likeUser(); }
    else if(currentX < -80){ animateCard('left'); skip(); }
    else { card.style.transform = ''; }
    currentX = 0;
  });
}

function animateCard(dir) {
  const card = document.getElementById('card');
  if(card){ card.style.transition='transform .4s ease'; card.style.transform=`translateX(${dir==='right'?600:-600}px) rotate(${dir==='right'?35:-35}deg)`; }
}

function skip(){ currentIndex++; setTimeout(showCard, 350); }
function goBack(){ if(currentIndex>0){ currentIndex--; showCard(); } }
function superLike(){
  if(!currentUser) return;
  const today = new Date().toDateString();
  const lastSuper = localStorage.getItem('lastSuperLike');
  if(lastSuper === today){
    showPremiumPopup('⭐ Суперлайк');
    return;
  }
  localStorage.setItem('lastSuperLike', today);
  likeUser();
}

async function likeUser() {
  if(!currentUser) return;
  try {
    const res = await fetch('/search/like/'+currentUser.id, {method:'POST', headers:{'Authorization':'Bearer '+token}});
    const data = await res.json();
    if(data.message && data.message.includes('Пара')){
      document.getElementById('matchPopup').classList.add('show');
    } else {
      currentIndex++; setTimeout(showCard, 350);
    }
  } catch(e){ currentIndex++; setTimeout(showCard, 350); }
}



function goToPremium(){ window.location.href='/premium'; }
function closePremium(){ document.getElementById('premiumPopup').classList.remove('show'); document.getElementById('premiumPopup').style.display='none'; }
function closeMatch(){ document.getElementById('matchPopup').classList.remove('show'); currentIndex++; showCard(); }
function goToChat(){ window.location.href='/chat'; }
function logout(){ localStorage.removeItem('token'); window.location.href='/'; }


async function loadUnread() {
  try {
    const res = await fetch('/chat/unread', {headers:{'Authorization':'Bearer '+token}});
    const data = await res.json();
    if(data.count > 0){
      document.getElementById('chatLink').innerHTML =
        `💬 Чат <span style="background:#ff4458;color:white;font-size:11px;font-weight:bold;padding:2px 7px;border-radius:50px;margin-left:4px">${data.count}</span>`;
    }
  } catch(e){}
}

loadUnread();
setInterval(loadUnread, 10000); // обновляем каждые 10 сек

loadUsers();

function boostClick(){
  showPremiumPopup('⚡ Буст');
}

function showPremiumPopup(feature){
  window.location.href='/subscription';
}


</script>

    <div style="font-size:42px;font-weight:900;color:white;margin-bottom:5px">990 ₸<span style="font-size:18px;opacity:.6">/мес</span></div>
    <div style="color:rgba(255,255,255,.5);font-size:14px;margin-bottom:20px">Безлимитные суперлайки и бусты</div>
    <div style="display:flex;flex-direction:column;gap:10px;text-align:left;color:rgba(255,255,255,.7);font-size:14px">
      <div>⭐ Безлимитные суперлайки</div>
      <div>⚡ Буст профиля каждый день</div>
      <div>👁 Кто тебя лайкнул</div>
      <div>🔄 Отмена последнего свайпа</div>
    </div>
  </div>
  <button class="match-btn" onclick="goToPremium()">👑 Оформить подписку</button>
  <button class="match-btn match-btn-chat" onclick="closePremium()">Позже</button>
</div>
</body>
